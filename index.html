<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Builder Academy</title>
    <meta name="description" content="Seven portfolio-grade AI engineering builds — MCP, multi-agent orchestration, evals, RAG guardrails, audit logs, fine-tuning, knowledge graphs.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠️</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand" onclick="app.goHome()">
                <span class="brand-icon">🛠️</span>
                <div>
                    <h1>AI Builder Academy</h1>
                    <p>Build it. Verify it. Ship it.</p>
                </div>
            </div>
            <div class="sidebar-progress">
                <div class="sidebar-progress-track"><div class="sidebar-progress-fill" id="overallFill"></div></div>
                <span id="overallLabel">0%</span>
            </div>
            <nav id="moduleNav"></nav>
            <div class="sidebar-footer">
                <button class="btn-ghost" onclick="ProgressManager.exportProgress()">⬇ Export</button>
                <label class="btn-ghost" style="cursor:pointer">⬆ Import<input type="file" accept=".json" style="display:none" onchange="app.importFile(this)"></label>
                <button class="btn-ghost" onclick="app.resetProgress()">↺ Reset</button>
            </div>
        </aside>
        <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <main class="main" id="main"></main>
    </div>
    <div id="toast" class="toast"></div>
    <script src="js/modules.js"></script>
    <script src="js/diagrams.js"></script>
    <script src="js/progress.js"></script>
    <script src="js/quiz-engine.js"></script>
    <script src="js/lab-engine.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
